services:
  holy-unblocker:
    image: node:24-trixie
    container_name: holy-unblocker
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - holy-unblocker-config:/app/config

volumes:
  holy-unblocker-config:
    name: holy-unblocker-config

networks:
  default:
    name: holy-unblocker
